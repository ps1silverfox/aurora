version: '3.9'

services:
  app:
    build:
      context: .
      target: production
    container_name: aurora-cms-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_DRIVER: oracle
      ORACLE_DSN: oracle:1521/XEPDB1
      ORACLE_USER: AURORA_CMS
      ORACLE_PASSWORD: ${ORACLE_CMS_PASSWORD:-aurora_cms_dev}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: aurora
      KEYCLOAK_CLIENT_ID: aurora-cms
      VALKEY_URL: redis://valkey:6379
    ports:
      - '3000:3000'
    depends_on:
      oracle:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - aurora-net
    volumes:
      - ./storage:/app/storage

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: aurora-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYS_PASSWORD:-oracle_dev_password}
      APP_USER: AURORA_CMS
      APP_USER_PASSWORD: ${ORACLE_CMS_PASSWORD:-aurora_cms_dev}
    ports:
      - '1521:1521'
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./docker/oracle/init:/container-entrypoint-initdb.d
    networks:
      - aurora-net
    healthcheck:
      test: ['CMD', 'healthcheck.sh']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: aurora-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-keycloak_dev_admin}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
    ports:
      - '8080:8080'
    networks:
      - aurora-net
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/health/ready || exit 1']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  valkey:
    image: valkey/valkey:7-alpine
    container_name: aurora-valkey
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - aurora-net
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: aurora-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - aurora-net

networks:
  aurora-net:
    driver: bridge

volumes:
  oracle-data:
